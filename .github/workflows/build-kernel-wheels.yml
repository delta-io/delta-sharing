name: Build delta-kernel-rust-sharing-wrapper wheels for 4 OS and 2 architectures

on:
  push:
    paths:
      - python/delta-kernel-rust-sharing-wrapper/**
      - .github/workflows/**
  pull_request:
    paths:
      - python/delta-kernel-rust-sharing-wrapper/**
      - .github/workflows/**

permissions: read-all

jobs:
  build:
    if: false  # Disabled: workflow uses pip install, violating org CI policy
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04, ubuntu-22.04, macos-latest, windows-latest]
        python-version: [3.8]
        arch: [x86_64, arm64]
        exclude:
          - os: ubuntu-latest
            arch: arm64
          - os: ubuntu-24.04
            arch: arm64
          - os: ubuntu-22.04
            arch: arm64
          - os: windows-latest
            arch: arm64

    steps:
      - uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5  # v2.7.0

      - name: Set up Python
        uses: actions/setup-python@e9aba2c848f5ebd159c070c61ea2c4e2b122355e  # v2.3.4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install maturin
        run: pip install maturin==1.12.6

      - name: Build wheel (x86_64 macOS)
        if: matrix.os == 'macos-latest' && matrix.arch == 'x86_64'
        run: |
          rustup target add x86_64-apple-darwin
          cd python/delta-kernel-rust-sharing-wrapper
          maturin build --release --target x86_64-apple-darwin
        shell: bash

      - name: Build wheel (ARM macOS)
        if: matrix.os == 'macos-latest' && matrix.arch == 'arm64'
        run: |
          rustup target add aarch64-apple-darwin
          cd python/delta-kernel-rust-sharing-wrapper
          maturin build --release --target aarch64-apple-darwin
        shell: bash

      - name: Build wheel (x86_64 Windows)
        if: runner.os == 'Windows'
        run: |
          cd python/delta-kernel-rust-sharing-wrapper
          maturin build --release
        shell: powershell

      - name: Build wheel (x86_64 Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd python/delta-kernel-rust-sharing-wrapper
          maturin build --release
        shell: bash

      - name: Build wheel (x86_64 Linux Ubuntu 24.04)
        if: matrix.os == 'ubuntu-24.04'
        run: |
          cd python/delta-kernel-rust-sharing-wrapper
          maturin build --release
        shell: bash

      - name: Build wheel (x86_64 Linux Ubuntu 22.04)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          cd python/delta-kernel-rust-sharing-wrapper
          maturin build --release
        shell: bash

      - name: Upload wheels
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: wheel-${{ matrix.os }}-${{ matrix.arch }}
          path: python/delta-kernel-rust-sharing-wrapper/target/wheels/*.whl

  merge:
    if: false  # Disabled: depends on build job which uses pip install
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Merge Artifacts
        uses: actions/upload-artifact/merge@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: all-wheels
          pattern: wheel-*
